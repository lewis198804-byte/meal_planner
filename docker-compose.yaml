
services:
  init-dirs:
    image: busybox
    command: |
      mkdir -p /data /static/recipe_images /app/backups &&
      chmod 777 /data /static/recipe_images /app/backups
    volumes:
      - ./data:/data
      - ./static/recipe_images:/static/recipe_images
      - ${BACKUP_DIR:-./backups}:/app/backups  # ← Added to init-dirs

  app:
    build: .
    ports:
      - "5002:5002"
    volumes:
      - ./data:/app/data
      - ./static/recipe_images:/app/static/recipe_images
      - ${BACKUP_DIR:-./backups}:/app/backups  # ← Host-relative default
      - ./.env:/app/.env

    environment:
      - FLASK_ENV=production
      - BACKUP_DIR=${BACKUP_DIR:-./backups}  # ← ./backups = stack-local
    depends_on:
      - init-dirs
