services:
  init-dirs:
    image: busybox
    command: mkdir -p /data /static/recipe_images && chmod 777 /data /static/recipe_images
    volumes:
      - ./data:/data
      - ./static/recipe_images:/static/recipe_images

  app:
    build: .
    ports:
      - "5002:5002"
    volumes:
      - ./data:/app/data  # SQLite DB + backups persist here
      - ./.env:/app/.env
      - ./static/recipe_images:/app/static/recipe_images  # ← NEW: Images safe forever
      - ${BACKUP_DIR:-/tmp/backups}:/app/backups
    environment:
      - FLASK_ENV=production
      - BACKUP_DIR=${BACKUP_DIR:-/tmp/backups}
    depends_on:
      - init-dirs
